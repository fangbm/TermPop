name: Build Extension Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-extension:
    name: Build and publish browser extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release version must look like v0.1.0; got '${version}'." >&2
            exit 1
          fi

          manifest_version="$(node -p "require('./extension/src/manifest.json').version")"
          package_version="$(node -p "require('./extension/package.json').version")"
          expected_version="${version#v}"

          if [ "${manifest_version}" != "${expected_version}" ]; then
            echo "Manifest version ${manifest_version} does not match ${version}." >&2
            exit 1
          fi

          if [ "${package_version}" != "${expected_version}" ]; then
            echo "Extension package version ${package_version} does not match ${version}." >&2
            exit 1
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "plain_version=${expected_version}" >> "$GITHUB_OUTPUT"

      - name: Test Rust workspace
        run: cargo test --workspace

      - name: Build WASM core
        run: wasm-pack build crates/termpop-core --target web --out-dir ../../extension/src/wasm -- --features wasm

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Typecheck extension
        working-directory: extension
        run: npm run typecheck

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Package extension
        id: package
        shell: bash
        run: |
          set -euo pipefail
          package_name="termpop-extension-${{ steps.version.outputs.version }}.zip"
          mkdir -p artifacts
          (cd extension/dist && zip -r "../../artifacts/${package_name}" .)
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_path=artifacts/${package_name}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          previous_tag="$(git tag --sort=-creatordate --merged HEAD --list 'v*' | grep -vx "${version}" | head -n 1 || true)"

          {
            echo "## TermPop ${version}"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Artifact: \`${{ steps.package.outputs.package_name }}\`"
            echo
            echo "## Changes"
            echo
            if [ -n "${previous_tag}" ]; then
              git log --pretty='- %s (`%h`)' "${previous_tag}..HEAD"
            else
              git log --pretty='- %s (`%h`)' --max-count=30
            fi
          } > release-notes.md

          echo "tag=${version}" >> "$GITHUB_OUTPUT"
          echo "release_name=${version}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: ${{ steps.release_meta.outputs.release_name }}
          body_path: release-notes.md
          files: ${{ steps.package.outputs.package_path }}
          make_latest: true
